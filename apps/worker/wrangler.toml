name = "echoes-of-emperors-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# CORS allowed origin(s) — set per-environment. Comma-separated list.
# Worker reads env.ALLOWED_ORIGINS at request time.
# Production deploys MUST set this to the GH Pages origin only:
#   ALLOWED_ORIGINS = "https://jasontiedt.github.io"
[vars]
# 5173 = vite dev (manual local), 5174 = vite preview (Playwright e2e).
ALLOWED_ORIGINS = "https://jasontiedt.github.io,http://localhost:5173,http://localhost:5174"

# KV namespace for game state. One key per gameCode (`game:<code>`).
# `id` below is a placeholder for `wrangler dev` (local Miniflare KV
# ignores it — storage is in-memory). Before `wrangler deploy`, replace
# with the real namespace id from `wrangler kv:namespace create GAMES`.
[[kv_namespaces]]
binding = "GAMES"
id = "fc7865669f1247bf9d4a76df50c6029b"

# Admin seed secret (#103). NOT committed — set per-environment via:
#   wrangler secret put ADMIN_SECRET
# When the binding is unset/empty the `POST /admin/games/:code/seed`
# endpoint refuses ALL callers (production deploys SHOULD omit it).
